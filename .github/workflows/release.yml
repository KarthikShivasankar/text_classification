name: Release

# Publishes tdsuite to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret is stored.
#
# One-time PyPI setup (https://pypi.org/manage/project/tdsuite/settings/publishing/):
#   Owner:        KarthikShivasankar
#   Repository:   text_classification
#   Workflow:     release.yml
#   Environment:  pypi
#
# Release flow:
#   1. Bump __version__ in tdsuite/__init__.py and commit.
#   2. git tag vX.Y.Z && git push --tags
#   3. Create a GitHub Release for that tag — this workflow then builds and publishes.

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tdsuite/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
